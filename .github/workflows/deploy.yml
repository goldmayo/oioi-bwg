name: Deploy to AWS Lambda (Production)

on:
  push:
    tags:
      - 'v*' # release-it으로 생성된 버전 태그가 푸시될 때만 실행
  workflow_dispatch: # 수동 실행 기능 유지 (롤백용)

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy (Production)
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Slack Notification - Start
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: workflow,commit,author,ref
          custom_payload: |
            {
              "attachments": [{
                "color": "#4361ee",
                "title": "🚀 프로덕션 배포 시작: AWS Lambda (ap-northeast-2)",
                "text": ${{ toJSON(format('새로운 버전({0})의 배포를 시작합니다.\n작성자: {1}\n커밋: {2}', github.ref_name, github.actor, github.event.head_commit.message)) }},
                "footer": "GitHub Actions"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # 1. pnpm 설치
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 2. Node.js 설정 및 pnpm 캐싱
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      # 3. 의존성 설치
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4. AWS Lambda 배포 (SST - Production)
      # SST가 내부적으로 OpenNext를 통해 next build를 자동으로 수행합니다.
      - name: Deploy to AWS (SST)
        run: npx sst deploy --stage production
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
          # 빌드 및 런타임 환경변수 주입
          NEXT_PUBLIC_APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Slack Notification - Success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: workflow,commit,author,ref
          custom_payload: |
            {
              "attachments": [{
                "color": "#2eb886",
                "title": "✅ 프로덕션 배포 완료!",
                "text": "AWS Lambda 서울 리전에 성공적으로 배포되었습니다.\n버전: ${{ github.ref_name }}",
                "footer": "GitHub Actions"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack Notification - Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: workflow,commit,author,ref
          custom_payload: |
            {
              "attachments": [{
                "color": "#ff0000",
                "title": "❌ 프로덕션 배포 실패!",
                "text": "배포 중 오류가 발생했습니다. 로그를 확인해 주세요.\n워크플로우: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "footer": "GitHub Actions"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
